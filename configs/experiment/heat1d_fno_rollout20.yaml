# Protocol-validation Heat1D config using the FNO1D baseline.
# This is not a final benchmark configuration.
name: heat1d_fno_rollout20

data_config: configs/data/heat1d.yaml
model_config: configs/model/fno1d.yaml
train_config: configs/train/default.yaml

data_path: data/processed/heat1d/heat1d.npz

input_steps: 10
pred_steps: 1
rollout_steps: 20

epochs: 2
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  modes: 8
  width: 16
  depth: 2
  dropout: 0.0

output_dir: outputs/heat1d_fno_rollout20
checkpoint_path: results/checkpoints/heat1d_fno_rollout20.pt
train_metrics_path: results/tables/heat1d_fno_rollout20_train_metrics.json
eval_metrics_path: results/tables/heat1d_fno_rollout20_eval_metrics.json
prediction_path: outputs/heat1d_fno_rollout20/predictions.npz
figures_dir: results/figures
