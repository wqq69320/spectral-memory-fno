# Medium-grid long-horizon Navier-Stokes2D diagnostic using SM-FNO2D v2.
#
# Protocol diagnostic only; not a final benchmark config.
name: navier_stokes2d_medium_sm_fno_v2_diagnostic

data_config: configs/data/navier_stokes2d_medium.yaml
model_config: configs/model/sm_fno2d_v2.yaml
train_config: configs/train/default.yaml

data_path: data/processed/navier_stokes2d_medium/navier_stokes2d_medium.npz

input_steps: 10
pred_steps: 1
rollout_steps: 36

epochs: 2
batch_size: 24
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  modes: 6
  width: 16
  state_dim: 16
  depth: 1
  dropout: 0.0

output_dir: outputs/navier_stokes2d_medium_sm_fno_v2_diagnostic
checkpoint_path: results/checkpoints/navier_stokes2d_medium_sm_fno_v2_diagnostic.pt
train_metrics_path: results/tables/navier_stokes2d_medium_sm_fno_v2_diagnostic_train_metrics.json
eval_metrics_path: results/tables/navier_stokes2d_medium_sm_fno_v2_diagnostic_eval_metrics.json
prediction_path: outputs/navier_stokes2d_medium_sm_fno_v2_diagnostic/predictions.npz
figures_dir: results/figures
