# Protocol-validation Navier-Stokes2D rollout-20 config for FNO2D.
name: navier_stokes2d_fno_rollout20

data_config: configs/data/navier_stokes2d.yaml
model_config: configs/model/fno2d.yaml
train_config: configs/train/default.yaml

data_path: data/processed/navier_stokes2d/navier_stokes2d.npz

input_steps: 10
pred_steps: 1
rollout_steps: 20

epochs: 2
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  modes: 4
  width: 12
  depth: 1
  dropout: 0.0

output_dir: outputs/navier_stokes2d_fno_rollout20
checkpoint_path: results/checkpoints/navier_stokes2d_fno_rollout20.pt
train_metrics_path: results/tables/navier_stokes2d_fno_rollout20_train_metrics.json
eval_metrics_path: results/tables/navier_stokes2d_fno_rollout20_eval_metrics.json
prediction_path: outputs/navier_stokes2d_fno_rollout20/predictions.npz
figures_dir: results/figures
