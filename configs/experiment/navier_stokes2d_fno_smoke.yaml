# CPU-friendly Navier-Stokes2D smoke experiment using the FNO2D baseline.
name: navier_stokes2d_fno_smoke

data_config: configs/data/navier_stokes2d.yaml
model_config: configs/model/fno2d.yaml
train_config: configs/train/default.yaml

data_path: data/processed/navier_stokes2d/navier_stokes2d.npz

input_steps: 10
pred_steps: 1
rollout_steps: 5

epochs: 2
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  modes: 4
  width: 12
  depth: 1
  dropout: 0.0

output_dir: outputs/navier_stokes2d_fno_smoke
checkpoint_path: results/checkpoints/navier_stokes2d_fno_smoke.pt
train_metrics_path: results/tables/navier_stokes2d_fno_smoke_train_metrics.json
eval_metrics_path: results/tables/navier_stokes2d_fno_smoke_eval_metrics.json
prediction_path: outputs/navier_stokes2d_fno_smoke/predictions.npz
figures_dir: results/figures
