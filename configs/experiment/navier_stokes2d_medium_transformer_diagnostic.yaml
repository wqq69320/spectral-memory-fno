# Medium-grid long-horizon Navier-Stokes2D diagnostic using Transformer2D.
#
# Protocol diagnostic only; not a final benchmark config. This config is
# included for feasibility testing and may be deferred if CPU runtime is too high.
name: navier_stokes2d_medium_transformer_diagnostic

data_config: configs/data/navier_stokes2d_medium.yaml
model_config: configs/model/transformer2d.yaml
train_config: configs/train/default.yaml

data_path: data/processed/navier_stokes2d_medium/navier_stokes2d_medium.npz

input_steps: 10
pred_steps: 1
rollout_steps: 36

epochs: 2
batch_size: 24
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  d_model: 24
  n_heads: 4
  num_layers: 1
  dim_feedforward: 48
  dropout: 0.0

output_dir: outputs/navier_stokes2d_medium_transformer_diagnostic
checkpoint_path: results/checkpoints/navier_stokes2d_medium_transformer_diagnostic.pt
train_metrics_path: results/tables/navier_stokes2d_medium_transformer_diagnostic_train_metrics.json
eval_metrics_path: results/tables/navier_stokes2d_medium_transformer_diagnostic_eval_metrics.json
prediction_path: outputs/navier_stokes2d_medium_transformer_diagnostic/predictions.npz
figures_dir: results/figures
