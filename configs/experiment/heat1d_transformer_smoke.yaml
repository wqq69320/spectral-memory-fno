# CPU-friendly Heat1D smoke experiment using the Transformer1D baseline.
name: heat1d_transformer_smoke

data_config: configs/data/heat1d.yaml
model_config: configs/model/transformer1d.yaml
train_config: configs/train/default.yaml

data_path: data/processed/heat1d/heat1d.npz

input_steps: 10
pred_steps: 1
rollout_steps: 5

epochs: 2
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
grad_clip_norm: 1.0
device: cpu
seed: 42

train_ratio: 0.8
val_ratio: 0.1

model_overrides:
  d_model: 32
  n_heads: 4
  num_layers: 1
  dim_feedforward: 64
  dropout: 0.0

output_dir: outputs/heat1d_transformer_smoke
checkpoint_path: results/checkpoints/heat1d_transformer_smoke.pt
train_metrics_path: results/tables/heat1d_transformer_smoke_train_metrics.json
eval_metrics_path: results/tables/heat1d_transformer_smoke_eval_metrics.json
prediction_path: outputs/heat1d_transformer_smoke/predictions.npz
figures_dir: results/figures
