# Model identifier.
name: transformer1d

# Input and output channel counts per grid point.
in_channels: 1
out_channels: 1

# Embedding dimension for temporal tokens.
d_model: 64

# Number of attention heads.
n_heads: 4

# Number of Transformer encoder layers.
num_layers: 2

# Feed-forward hidden dimension.
dim_feedforward: 128

# Dropout probability used during training.
dropout: 0.0
