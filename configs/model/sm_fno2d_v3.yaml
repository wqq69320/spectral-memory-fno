# Model identifier.
name: sm_fno2d_v3

# Input and output channel counts per grid point.
in_channels: 1
out_channels: 1

# Number of retained Fourier modes for the residual FNO2D base predictor.
modes: 8

# Channel width used by the FNO base and temporal correction path.
width: 32

# Dimension of the stable gated state space memory.
state_dim: 32

# Number of spectral blocks in the residual FNO2D base.
depth: 4

# Upper bound applied to the learned correction gate.
gate_limit: 0.25

# Initial gate logit; negative values keep early corrections conservative.
gate_bias: -4.0

# Multiplier applied after the learned gate.
correction_scale: 1.0

# Dropout probability used during training.
dropout: 0.0
