# Model identifier.
name: fno1d

# Input and output channel counts per grid point.
in_channels: 1
out_channels: 1

# Number of retained Fourier modes.
modes: 16

# Channel width used inside the FNO block.
width: 64

# Number of spectral convolution blocks.
depth: 4

# Dropout probability used during training.
dropout: 0.0
